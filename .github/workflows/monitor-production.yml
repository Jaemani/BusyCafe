name: Monitor production freshness

on:
  schedule:
    # Run two minutes after the poll slot so completed cycles are observable.
    - cron: "9,19,29,39,49,59 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-freshness-monitor
  cancel-in-progress: true

jobs:
  freshness:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      PRODUCTION_MONITOR_ENABLED: ${{ vars.PRODUCTION_MONITOR_ENABLED }}
      PRODUCTION_ENABLED: ${{ vars.PRODUCTION_ENABLED }}
      PRODUCTION_HEALTH_URL: ${{ vars.PRODUCTION_HEALTH_URL }}
    steps:
      - id: configuration
        name: Check monitor configuration
        run: |
          case "$PRODUCTION_MONITOR_ENABLED" in
            true|false)
              monitor_enabled="$PRODUCTION_MONITOR_ENABLED"
              gate_source="PRODUCTION_MONITOR_ENABLED"
              ;;
            "")
              case "$PRODUCTION_ENABLED" in
                true|false)
                  monitor_enabled="$PRODUCTION_ENABLED"
                  gate_source="legacy PRODUCTION_ENABLED"
                  echo "PRODUCTION_MONITOR_ENABLED is unset; using legacy PRODUCTION_ENABLED." >&2
                  ;;
                "")
                  monitor_enabled="false"
                  gate_source="default"
                  ;;
                *)
                  echo "PRODUCTION_ENABLED must be exactly true or false when used as the legacy fallback." >&2
                  exit 1
                  ;;
              esac
              ;;
            *)
              echo "PRODUCTION_MONITOR_ENABLED must be exactly true or false." >&2
              exit 1
              ;;
          esac

          if [ "$monitor_enabled" != "true" ]; then
            echo "Production monitoring disabled by $gate_source; skipping."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "$PRODUCTION_HEALTH_URL" ]; then
            echo "Production monitoring is enabled but PRODUCTION_HEALTH_URL is missing." >&2
            exit 1
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"
      - if: steps.configuration.outputs.enabled == 'true'
        uses: actions/checkout@v5
      - if: steps.configuration.outputs.enabled == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - if: steps.configuration.outputs.enabled == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - if: steps.configuration.outputs.enabled == 'true'
        working-directory: backend
        run: uv sync --frozen
      - if: steps.configuration.outputs.enabled == 'true'
        working-directory: backend
        run: uv run python scripts/check_freshness.py "$PRODUCTION_HEALTH_URL"
