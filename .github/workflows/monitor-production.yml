name: Monitor production freshness

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-freshness-monitor
  cancel-in-progress: true

jobs:
  freshness:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    env:
      PRODUCTION_ENABLED: ${{ vars.PRODUCTION_ENABLED }}
      PRODUCTION_HEALTH_URL: ${{ vars.PRODUCTION_HEALTH_URL }}
    steps:
      - id: configuration
        name: Check monitor configuration
        run: |
          if [ "$PRODUCTION_ENABLED" != "true" ]; then
            echo "Production monitoring disabled (set PRODUCTION_ENABLED=true to enable); skipping."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "$PRODUCTION_HEALTH_URL" ]; then
            echo "PRODUCTION_ENABLED=true but PRODUCTION_HEALTH_URL is missing." >&2
            exit 1
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"
      - if: steps.configuration.outputs.enabled == 'true'
        uses: actions/checkout@v4
      - if: steps.configuration.outputs.enabled == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - if: steps.configuration.outputs.enabled == 'true'
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - if: steps.configuration.outputs.enabled == 'true'
        working-directory: backend
        run: uv sync --frozen
      - if: steps.configuration.outputs.enabled == 'true'
        working-directory: backend
        run: uv run python scripts/check_freshness.py "$PRODUCTION_HEALTH_URL"
