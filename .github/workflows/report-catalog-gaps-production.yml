name: Report production catalog gaps

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-catalog-gap-report
  cancel-in-progress: true

jobs:
  report:
    environment: Production
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: Report aggregate provider-link gaps without writes
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: uv run python scripts/report_catalog_gaps.py
