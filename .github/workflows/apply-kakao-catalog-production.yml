name: Apply production Kakao canonical cafe catalog

on:
  schedule:
    # Tuesday 03:23 KST. Off-peak, once weekly, away from ingest cron minutes.
    - cron: "23 18 * * 1"
  workflow_dispatch:
    inputs:
      max_expected_candidates:
        description: "Maximum Kakao-owned cafes allowed to insert (1-40000)"
        required: true
        default: 25000
        type: number
      max_expected_large_moves:
        description: "Authorize all >250m moves only when discovered count is at most this bound; otherwise quarantine all (0-40000)"
        required: true
        default: 0
        type: number
      confirmation:
        description: "Type APPLY_KAKAO_CATALOG exactly"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: production-cafe-catalog-refresh
  cancel-in-progress: false

jobs:
  apply:
    environment: Production
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      KAKAO_REST_KEY: ${{ secrets.KAKAO_REST_KEY }}
      MAX_EXPECTED_CANDIDATES: ${{ github.event_name == 'schedule' && '2000' || inputs.max_expected_candidates }}
      MAX_EXPECTED_LARGE_MOVES: ${{ github.event_name == 'schedule' && '0' || inputs.max_expected_large_moves }}
      CONFIRMATION: ${{ inputs.confirmation }}
      KAKAO_CACHE: data/kakao-apply/kakao-ce7-seoul.jsonl
      KAKAO_MANIFEST: data/kakao-apply/kakao-ce7-seoul.jsonl.manifest.json
      KAKAO_DRY_RUN_REPORT: data/kakao-apply/dry-run-report.json
      KAKAO_APPLY_REPORT: data/kakao-apply/apply-report.json
    steps:
      - name: Check secrets, bound, and exact confirmation
        working-directory: .
        run: |
          if [ -z "${DATABASE_URL:-}" ] || [ -z "${KAKAO_REST_KEY:-}" ]; then
            echo "DATABASE_URL and KAKAO_REST_KEY are required" >&2
            exit 1
          fi
          case "$DATABASE_URL" in
            postgresql://*|postgres://*|postgresql+psycopg://*) ;;
            *)
              echo "DATABASE_URL must be a PostgreSQL connection string" >&2
              exit 1
              ;;
          esac
          case "$MAX_EXPECTED_CANDIDATES" in
            ''|*[!0-9]*)
              echo "max_expected_candidates must be an integer from 1 through 40000" >&2
              exit 1
              ;;
          esac
          if [ "$MAX_EXPECTED_CANDIDATES" -lt 1 ] || [ "$MAX_EXPECTED_CANDIDATES" -gt 40000 ]; then
            echo "max_expected_candidates must be an integer from 1 through 40000" >&2
            exit 1
          fi
          case "$MAX_EXPECTED_LARGE_MOVES" in
            ''|*[!0-9]*)
              echo "max_expected_large_moves must be an integer from 0 through 40000" >&2
              exit 1
              ;;
          esac
          if [ "$MAX_EXPECTED_LARGE_MOVES" -lt 0 ] || [ "$MAX_EXPECTED_LARGE_MOVES" -gt 40000 ]; then
            echo "max_expected_large_moves must be an integer from 0 through 40000" >&2
            exit 1
          fi
          if [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
            if [ "$MAX_EXPECTED_CANDIDATES" != "2000" ] || [ "$MAX_EXPECTED_LARGE_MOVES" != "0" ]; then
              echo "scheduled Kakao refresh must use fixed bounds 2000 candidates and 0 large moves" >&2
              exit 1
            fi
          elif [ "$CONFIRMATION" != "APPLY_KAKAO_CATALOG" ]; then
            echo "confirmation must equal APPLY_KAKAO_CATALOG" >&2
            exit 1
          fi

      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --frozen

      - name: Prepare ephemeral Kakao workspace
        run: mkdir -p "$(dirname "$KAKAO_CACHE")"

      - name: Sweep and validate current Kakao CE7 catalog
        run: >-
          uv run python scripts/cache_kakao_cafes.py
          --output "$KAKAO_CACHE"
          --apply

      - name: Verify production database schema
        run: uv run alembic -c alembic.ini current --check-heads

      - name: Re-read production and dry-run exact expansion
        run: |
          set -o pipefail
          uv run python scripts/seed_kakao_catalog_expansion.py \
            --kakao-cache "$KAKAO_CACHE" \
            --kakao-manifest "$KAKAO_MANIFEST" \
            --max-candidates "$MAX_EXPECTED_CANDIDATES" \
            --max-large-moves "$MAX_EXPECTED_LARGE_MOVES" \
            | tee "$KAKAO_DRY_RUN_REPORT"

      - name: Re-read production and apply exact expansion
        run: |
          set -o pipefail
          uv run python scripts/seed_kakao_catalog_expansion.py \
            --kakao-cache "$KAKAO_CACHE" \
            --kakao-manifest "$KAKAO_MANIFEST" \
            --max-candidates "$MAX_EXPECTED_CANDIDATES" \
            --max-large-moves "$MAX_EXPECTED_LARGE_MOVES" \
            --apply \
            | tee "$KAKAO_APPLY_REPORT"

      - name: Materialize cafe scores after insert
        run: uv run python scripts/materialize_scores.py

      - if: ${{ always() }}
        name: Upload validated Kakao manifest and apply reports
        uses: actions/upload-artifact@v6
        with:
          name: kakao-catalog-apply-manifest-${{ github.run_id }}
          path: |
            backend/${{ env.KAKAO_MANIFEST }}
            backend/${{ env.KAKAO_DRY_RUN_REPORT }}
            backend/${{ env.KAKAO_APPLY_REPORT }}
          if-no-files-found: warn
          retention-days: 30
