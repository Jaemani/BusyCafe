name: Bootstrap production database

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply seeds and run the first ingest cycle"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: production-db-bootstrap
  cancel-in-progress: false

jobs:
  bootstrap:
    environment: Production
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SEOUL_API_KEY: ${{ secrets.SEOUL_API_KEY }}
      OVERTURE_CACHE: ${{ runner.temp }}/overture-seoul-cafes.parquet
    steps:
      - name: Check production secrets
        working-directory: .
        run: |
          if [ -z "${DATABASE_URL:-}" ] || [ -z "${SEOUL_API_KEY:-}" ]; then
            echo "Production DATABASE_URL and SEOUL_API_KEY are required." >&2
            exit 1
          fi
          case "$DATABASE_URL" in
            postgresql://*|postgres://*|postgresql+psycopg://*) ;;
            *)
              echo "DATABASE_URL must be a PostgreSQL connection string." >&2
              exit 1
              ;;
          esac

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install locked dependencies
        run: uv sync --frozen

      - id: migrate
        name: Apply and verify migrations
        run: |
          uv run alembic -c alembic.ini upgrade head
          uv run alembic -c alembic.ini current --check-heads

      - name: Dry-run hotspot seed
        run: uv run python scripts/seed_hotspots.py

      - name: Download immutable Overture cache
        run: >-
          uv run python scripts/seed_cafes.py
          --download
          --download-only
          --cache "$OVERTURE_CACHE"

      - name: Dry-run cafe seed
        run: >-
          uv run python scripts/seed_cafes.py
          --cache "$OVERTURE_CACHE"

      - if: ${{ inputs.apply == true }}
        name: Apply hotspot seed
        run: uv run python scripts/seed_hotspots.py --apply

      - if: ${{ inputs.apply == true }}
        name: Apply cafe seed
        run: >-
          uv run python scripts/seed_cafes.py
          --cache "$OVERTURE_CACHE"
          --apply

      - if: ${{ inputs.apply == true }}
        name: Run first ingest cycle
        run: uv run python -m app.ingest.worker --once

      - if: ${{ always() && steps.migrate.outcome == 'success' }}
        name: Print secret-safe database summary
        run: |
          uv run python - <<'PY'
          from sqlalchemy import func, select, text
          from sqlalchemy.orm import Session

          from app.database import create_db_engine
          from app.models import Cafe, Hotspot, IngestCycle

          engine = create_db_engine()
          try:
              with Session(engine) as session:
                  heads = tuple(
                      session.scalars(text("SELECT version_num FROM alembic_version"))
                  )
                  hotspots = session.scalar(
                      select(func.count()).select_from(Hotspot)
                  )
                  polled = session.scalar(
                      select(func.count())
                      .select_from(Hotspot)
                      .where(Hotspot.is_polled.is_(True))
                  )
                  active_cafes = session.scalar(
                      select(func.count())
                      .select_from(Cafe)
                      .where(Cafe.active.is_(True))
                  )
                  cycle = session.scalar(
                      select(IngestCycle).order_by(IngestCycle.id.desc()).limit(1)
                  )

              print("Production DB summary")
              print(f"alembic head: {','.join(heads) if heads else 'none'}")
              print(f"hotspots: {hotspots}")
              print(f"polled hotspots: {polled}")
              print(f"active cafes: {active_cafes}")
              if cycle is None:
                  print("latest ingest cycle: none")
              else:
                  print(
                      "latest ingest cycle: "
                      f"status={cycle.status} targets={cycle.targets} "
                      f"saved={cycle.saved} failed={cycle.failed}"
                  )
          finally:
              engine.dispose()
          PY
