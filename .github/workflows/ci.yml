name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: cafe_crowd_test
          POSTGRES_USER: cafe_crowd
          POSTGRES_PASSWORD: cafe_crowd_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cafe_crowd -d cafe_crowd_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+psycopg://cafe_crowd:cafe_crowd_test@127.0.0.1:5432/cafe_crowd_test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --frozen --extra dev
      - run: uv run pytest
      - run: uv run python -m compileall -q app scripts tests
      - run: uv run alembic -c alembic.ini upgrade head --sql > /dev/null
      - run: uv run alembic -c alembic.ini upgrade head
      - run: uv run alembic -c alembic.ini current --check-heads
      - name: Smoke-test migrated schema
        run: >-
          uv run python -c
          "import os;
          from sqlalchemy import create_engine, inspect;
          required = {'alembic_version', 'ingest_cycles', 'hotspots', 'hotspot_snapshots', 'hotspot_parse_failures', 'cafes', 'cafe_provider_places', 'cafe_scores'};
          actual = set(inspect(create_engine(os.environ['DATABASE_URL']).connect()).get_table_names());
          missing = required - actual;
          assert not missing, f'missing migrated tables: {sorted(missing)}'"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
