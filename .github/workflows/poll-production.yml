name: Poll production city data

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-citydata-poll
  cancel-in-progress: false

jobs:
  poll:
    environment: Production
    runs-on: ubuntu-latest
    # Keep the whole job below the 10-minute schedule while reserving one
    # minute for the worker's interrupt cleanup and runner teardown.
    timeout-minutes: 9
    defaults:
      run:
        working-directory: backend
    env:
      PRODUCTION_ENABLED: ${{ vars.PRODUCTION_ENABLED }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SEOUL_API_KEY: ${{ secrets.SEOUL_API_KEY }}
    steps:
      - id: configuration
        name: Check production secrets
        working-directory: .
        run: |
          if [ "$PRODUCTION_ENABLED" != "true" ]; then
            echo "Production polling disabled (set PRODUCTION_ENABLED=true to enable); skipping."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "$DATABASE_URL" ] || [ -z "$SEOUL_API_KEY" ]; then
            echo "PRODUCTION_ENABLED=true but DATABASE_URL or SEOUL_API_KEY is missing." >&2
            exit 1
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"
      - if: steps.configuration.outputs.enabled == 'true'
        uses: actions/checkout@v4
      - if: steps.configuration.outputs.enabled == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - if: steps.configuration.outputs.enabled == 'true'
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - if: steps.configuration.outputs.enabled == 'true'
        run: uv sync --frozen
      - if: steps.configuration.outputs.enabled == 'true'
        run: uv run alembic -c alembic.ini upgrade head
      - if: steps.configuration.outputs.enabled == 'true'
        name: Poll all hotspots
        # SIGINT lets the worker mark its durable cycle failed before the
        # outer job timeout.  A hard kill remains as a bounded fallback.
        run: timeout --signal=INT --kill-after=30s 8m uv run python -m app.ingest.worker --once
