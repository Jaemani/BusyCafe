name: Evaluate production nowcast shadow

on:
  schedule:
    # Daily read-only readiness check. This never promotes a model or writes DB.
    - cron: "23 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-nowcast-shadow-evaluation
  cancel-in-progress: true

jobs:
  evaluate:
    environment: Production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --frozen
      - name: Backtest saved forecasts without writes
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: uv run python scripts/run_nowcast_backtest.py
