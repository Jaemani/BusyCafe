<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="서울 주요 상권에서 상대적으로 한산할 가능성이 높은 카페를 찾는 지도"
    />
    <link rel="canonical" href="https://busy-cafe.vercel.app/" />
    <meta property="og:url" content="https://busy-cafe.vercel.app/" />
    <title>Busy Cafe</title>
  </head>
  <body>
    <main id="app">
      <div id="map" aria-label="서울 카페 지도"></div>

      <header class="map-header">
        <div class="brand">
          <img class="brand-mark" src="/logo.png" alt="" />
          <div>
            <p class="eyebrow">BUSY CAFE</p>
            <h1>지금, 어디가 덜 붐빌까?</h1>
          </div>
        </div>
        <p id="search-status" class="search-status" role="status">
          지도를 준비하고 있습니다
        </p>
        <p class="source-line">
          혼잡도
          <a
            href="https://data.seoul.go.kr/dataList/OA-21285/A/1/datasetView.do"
            target="_blank"
            rel="noopener noreferrer"
          >서울특별시 서울시 실시간 도시데이터</a>
          · 카페
          <a
            href="https://docs.overturemaps.org/attribution/"
            target="_blank"
            rel="noopener noreferrer"
          >Overture Places</a>
          · <a href="/api/sources" target="_blank" rel="noopener noreferrer">전체 라이선스</a>
        </p>
      </header>

      <aside id="cafe-panel" class="cafe-panel" aria-live="polite" hidden>
        <button id="panel-close" class="panel-close" type="button" aria-label="닫기">×</button>
        <p class="panel-label">선택한 카페</p>
        <h2 id="cafe-name"></h2>
        <p id="cafe-address" class="cafe-address"></p>
        <div class="cafe-contact">
          <span id="cafe-phone">전화 정보 없음</span>
          <a id="cafe-website" target="_blank" rel="noopener noreferrer" hidden>등록 웹사이트</a>
        </div>
        <div class="estimate-placeholder">
          <span id="estimate-dot" class="estimate-dot" data-level="0"></span>
          <div>
            <strong>주변 혼잡도 추정 · <span id="cafe-level">데이터 없음</span></strong>
            <p id="cafe-evidence">이 지역은 아직 혼잡도 근거가 연결되지 않았어요.</p>
            <div class="estimate-badges">
              <span id="cafe-coverage">실시간 미커버</span>
              <span id="cafe-confidence">근거 강도 산정 전</span>
            </div>
          </div>
        </div>
        <p id="cafe-source" class="cafe-source"></p>
        <nav id="external-map-links" class="external-map-links" aria-label="외부 지도에서 보기" hidden>
          <a id="map-link-naver" target="_blank" rel="noopener noreferrer" hidden>네이버지도에서 보기</a>
          <a id="map-link-kakao" target="_blank" rel="noopener noreferrer" hidden>카카오맵에서 보기</a>
          <a id="map-link-google" target="_blank" rel="noopener noreferrer" hidden>Google 지도에서 보기</a>
        </nav>
      </aside>

      <div id="map-legend" class="legend" data-state="preview" aria-label="지도 안내">
        <span class="legend-level"><i class="legend-marker level-calm"></i>여유</span>
        <span class="legend-level"><i class="legend-marker level-normal"></i>보통</span>
        <span class="legend-level"><i class="legend-marker level-crowded"></i>약간 붐빔</span>
        <span class="legend-level"><i class="legend-marker level-busy"></i>붐빔</span>
        <span class="legend-level"><i class="legend-marker level-none"></i>데이터 없음</span>
        <span class="legend-level"><i class="legend-marker level-normal delayed"></i>흐린 색 · 지연 참고용</span>
        <span class="legend-preview"><i class="legend-marker level-none"></i>카페 위치 미리보기 · 혼잡도 연결 중</span>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
