<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="서울 주요 상권에서 상대적으로 한산할 가능성이 높은 카페를 찾는 지도"
    />
    <title>Busy Cafe</title>
  </head>
  <body>
    <main id="app">
      <div id="map" aria-label="서울 카페 지도"></div>

      <header class="map-header">
        <div>
          <p class="eyebrow">BUSY CAFE</p>
          <h1>지금, 어디가 덜 붐빌까?</h1>
        </div>
        <p id="search-status" class="search-status" role="status">
          지도를 준비하고 있습니다
        </p>
      </header>

      <aside id="cafe-panel" class="cafe-panel" aria-live="polite" hidden>
        <button id="panel-close" class="panel-close" type="button" aria-label="닫기">×</button>
        <p class="panel-label">선택한 카페</p>
        <h2 id="cafe-name"></h2>
        <p id="cafe-address" class="cafe-address"></p>
        <div class="estimate-placeholder">
          <span class="estimate-dot"></span>
          <div>
            <strong>주변 혼잡도 연결 전</strong>
            <p>카페 위치는 실제 Kakao Local 결과이며, 혼잡도는 추정 근거가 준비된 뒤 표시합니다.</p>
          </div>
        </div>
        <a id="cafe-link" class="cafe-link" target="_blank" rel="noreferrer">카카오맵에서 보기</a>
      </aside>

      <div class="legend" aria-label="지도 안내">
        <span class="legend-marker"></span>
        현재 화면의 카페
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
